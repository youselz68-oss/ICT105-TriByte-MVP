<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide Details | HallPass</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="logo"><i class="fa-solid fa-school"></i></div>
        HallPass
      </a>
      <button class="menu">☰</button>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="dorms.html">Dorm Reviews</a>
        <a href="cafeteria.html">Cafeteria Reviews</a>
        <a href="guide.html">Survival Guide</a>
        <a href="write-review.html">Write Review</a>
        <a href="login.html" class="btn-nav">Login</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="guide-detail-hero">
      <div class="container">
        <a class="back-link" href="guide.html">
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
          All guide topics
        </a>
        <div class="guide-detail-heading">
          <div class="guide-icon guide-detail-icon" id="guideDetailIcon"></div>
          <div>
            <span class="guide-kicker" id="guideDetailCategory"></span>
            <h1 id="guideDetailTitle">Student Guide</h1>
            <p id="guideDetailSummary"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container guide-detail-layout">
        <article class="guide-article">
          <section>
            <h2>What you should know</h2>
            <p id="guideDetailOverview"></p>
          </section>

          <section>
            <h2>Recommended steps</h2>
            <ol class="guide-steps" id="guideDetailSteps"></ol>
          </section>

          <section>
            <h2>Helpful tips</h2>
            <div class="guide-tip-grid" id="guideDetailTips"></div>
          </section>
        </article>

        <aside class="guide-side-card">
          <span class="guide-kicker">Quick checklist</span>
          <h2>Before you go</h2>
          <ul class="check-list" id="guideDetailChecklist"></ul>
          <div class="guide-related" id="guideDetailRelated"></div>
        </aside>
      </div>
    </section>
  </main>

  <div class="toast"></div>
  <footer class="footer"></footer>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/guide-details.js"></script>
</body>
</html>
